name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # required to create the GitHub Release; nothing more

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog can be built
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod # single source of truth for the Go version
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
